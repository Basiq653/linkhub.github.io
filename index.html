<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vlink — Все ваши ссылки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
html,body{margin:0;background:#080b10}
#boot-screen{position:fixed;inset:0;background:#080b10;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .5s ease}
#boot-screen.fade{opacity:0;pointer-events:none}
.boot-logo{font-size:4rem;font-weight:900;letter-spacing:.2em;background:linear-gradient(135deg,#4f9eff,#7b5ea7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:28px;font-family:system-ui,sans-serif}
.boot-dots{display:flex;gap:8px}
.boot-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#4f9eff,#7b5ea7);animation:dotpulse 1.2s ease infinite}
.boot-dot:nth-child(2){animation-delay:.2s}
.boot-dot:nth-child(3){animation-delay:.4s}
@keyframes dotpulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="boot-screen">
  <div class="boot-logo">VLINK</div>
  <div class="boot-dots"><div class="boot-dot"></div><div class="boot-dot"></div><div class="boot-dot"></div></div>
</div>
<div id="root"></div>

.add-link-form{background:rgba(79,158,255,.05);border:1px dashed rgba(79,158,255,.2);border-radius:12px;padding:20px;margin-bottom:16px}
.add-link-form .form-input{margin-bottom:10px}
.preview-phone{background:var(--card2);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:sticky;top:88px}
.preview-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.preview-title{font-size:.78rem;color:var(--muted);font-weight:500}
.preview-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3)}
.preview-body{padding:28px 20px;min-height:400px;display:flex;flex-direction:column;align-items:center}
.preview-avatar{width:72px;height:72px;border-radius:50%;background:var(--gradient);margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:1.6rem;font-weight:800;color:#fff;overflow:hidden}
.preview-name{font-family:var(--font-head);font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:6px}
.preview-bio{font-size:.8rem;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:20px;max-width:220px}
.preview-link{width:100%;padding:11px 16px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);font-size:.82rem;text-align:center;margin-bottom:8px;color:var(--text);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;text-decoration:none}
.preview-empty{color:var(--muted);font-size:.8rem;text-align:center;padding:20px 0;opacity:.6}
.bg-option{height:72px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .2s ease;overflow:hidden;position:relative}
.bg-option.selected{border-color:var(--accent)}
.toggle-card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;transition:all .2s}
.toggle-card.active{border-color:rgba(79,158,255,.3);background:rgba(79,158,255,.05)}
.toggle-title{font-weight:500;font-size:.9rem;margin-bottom:2px}
.toggle-desc{font-size:.75rem;color:var(--muted)}
.save-bar{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding-top:20px;border-top:1px solid var(--border);margin-top:24px}
.save-success{display:flex;align-items:center;gap:6px;font-size:.875rem;color:var(--accent3);animation:fadeIn .3s ease}
.public-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden}
.public-bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center}
.public-bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.5)}
.public-card{width:100%;max-width:420px;animation:fadeUp .5s ease;position:relative;z-index:10}
.public-avatar{width:96px;height:96px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:2.2rem;font-weight:800;color:#fff;overflow:hidden;border:3px solid rgba(255,255,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.public-avatar img{width:100%;height:100%;object-fit:cover}
.public-name{font-family:var(--font-head);font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:8px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.public-bio{font-size:.9rem;color:rgba(255,255,255,.7);text-align:center;line-height:1.6;margin-bottom:28px}
.public-link{display:flex;align-items:center;gap:12px;width:100%;padding:14px 20px;border-radius:14px;border:1px solid rgba(255,255,255,.1);text-decoration:none;color:#fff;font-size:.95rem;font-weight:500;margin-bottom:10px;transition:all .25s ease;backdrop-filter:blur(8px)}
.public-link:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.glow-effect{animation:glowPulse 3s ease infinite}
.public-link-icon{font-size:1.2rem;flex-shrink:0}
.public-link-text{flex:1;text-align:center}
.public-footer{text-align:center;margin-top:28px;font-size:.8rem;color:rgba(255,255,255,.4);cursor:pointer}
.music-player{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;margin-bottom:16px;width:100%}
.music-cover{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.music-info{flex:1;min-width:0}
.music-title{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-sub{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:2px}
.music-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.full-center{display:flex;align-items:center;justify-content:center;min-height:100vh}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spinner-small{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
.animated-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(270deg,#0a0a1a,#0a1628,#1a0a2e,#0a1a1f);background-size:400% 400%;animation:bgShift 15s ease infinite}
.share-section{background:rgba(79,158,255,.05);border:1px solid rgba(79,158,255,.2);border-radius:16px;padding:24px;margin-bottom:24px}
.share-title{font-family:var(--font-head);font-size:1.1rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.share-desc{font-size:.85rem;color:var(--muted);margin-bottom:16px;line-height:1.6}
.share-url{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-family:monospace;font-size:.85rem;color:var(--accent);word-break:break-all;margin-bottom:12px}
.not-found{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:24px}
</style>
