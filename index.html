<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinkHub — Всё, что нужно в одном месте</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b10;
  --bg2:#0d1117;
  --card:#111820;
  --card2:#16202c;
  --border:#1e2d3d;
  --border2:#253545;
  --text:#e8edf2;
  --muted:#6b8299;
  --accent:#4f9eff;
  --accent2:#7b5ea7;
  --accent3:#1de9b6;
  --gradient:linear-gradient(135deg,#4f9eff,#7b5ea7);
  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius:14px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Noise overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes orb{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}100%{transform:translate(0,0) scale(1)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.anim-fade-up{animation:fadeUp .6s ease both}
.anim-fade-in{animation:fadeIn .4s ease both}
.anim-slide{animation:slideIn .4s ease both}

/* Background orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orb 12s ease-in-out infinite}
.orb1{width:500px;height:500px;background:rgba(79,158,255,.07);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:rgba(123,94,167,.07);bottom:-80px;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:rgba(29,233,182,.05);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .3s ease;
}
nav.scrolled{
  background:rgba(8,11,16,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:var(--font-head);font-weight:800;font-size:1.25rem;
  background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;cursor:pointer;
}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{
  padding:8px 16px;border-radius:8px;font-size:.9rem;color:var(--muted);
  cursor:pointer;transition:all .2s ease;text-decoration:none;background:none;border:none;font-family:var(--font-body);
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-actions{display:flex;align-items:center;gap:8px}
.btn{
  padding:9px 20px;border-radius:10px;font-size:.875rem;font-weight:500;cursor:pointer;
  transition:all .2s ease;border:none;font-family:var(--font-body);
}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,.04)}
.btn-primary{
  background:var(--gradient);color:#fff;
  box-shadow:0 4px 20px rgba(79,158,255,.25);
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 28px rgba(79,158,255,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-sm{padding:7px 14px;font-size:.8rem}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.25)}

/* Mobile nav */
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.burger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s ease}
.mobile-menu{
  display:none;position:fixed;top:64px;left:0;right:0;z-index:99;
  background:rgba(8,11,16,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:16px;
  flex-direction:column;gap:4px;
}
.mobile-menu.open{display:flex}
@media(max-width:768px){
  .nav-links,.nav-actions{display:none}
  .burger{display:flex}
}

/* Hero */
.hero{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:80px 24px 40px;position:relative;z-index:1;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:100px;
  background:rgba(79,158,255,.1);border:1px solid rgba(79,158,255,.2);
  font-size:.8rem;color:var(--accent);margin-bottom:28px;
  animation:fadeUp .5s ease both;
}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite}
h1.hero-title{
  font-family:var(--font-head);font-size:clamp(2.5rem,7vw,5rem);font-weight:800;
  line-height:1.05;letter-spacing:-.03em;margin-bottom:24px;
  animation:fadeUp .6s .1s ease both;
}
.gradient-text{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-subtitle{
  font-size:clamp(1rem,2.5vw,1.2rem);color:var(--muted);max-width:540px;margin:0 auto 40px;
  line-height:1.65;animation:fadeUp .6s .2s ease both;
}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fadeUp .6s .3s ease both}
.hero-stats{
  display:flex;gap:40px;justify-content:center;flex-wrap:wrap;
  margin-top:64px;padding-top:40px;border-top:1px solid var(--border);
  animation:fadeUp .6s .4s ease both;
}
.stat-item{text-align:center}
.stat-num{font-family:var(--font-head);font-size:2rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.8rem;color:var(--muted);margin-top:2px}

/* Section */
section{padding:100px 24px;position:relative;z-index:1}
.section-inner{max-width:1100px;margin:0 auto}
.section-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:100px;
  background:rgba(79,158,255,.08);border:1px solid rgba(79,158,255,.15);
  font-size:.78rem;color:var(--accent);margin-bottom:20px;font-weight:500;
}
h2.section-title{
  font-family:var(--font-head);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;
  letter-spacing:-.02em;margin-bottom:16px;
}
.section-sub{font-size:1.05rem;color:var(--muted);max-width:480px;line-height:1.6;margin-bottom:60px}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0}

/* Features grid */
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.feature-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;transition:all .3s ease;position:relative;overflow:hidden;
}
.feature-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(79,158,255,.06) 0%, transparent 60%);
  opacity:0;transition:opacity .3s ease;
}
.feature-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.feature-card:hover::before{opacity:1}
.feature-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(79,158,255,.12);border:1px solid rgba(79,158,255,.15);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:1.3rem;
}
.feature-title{font-family:var(--font-head);font-weight:700;font-size:1.05rem;margin-bottom:8px}
.feature-desc{font-size:.9rem;color:var(--muted);line-height:1.6}

/* FAQ */
.faq-list{display:flex;flex-direction:column;gap:12px;max-width:720px}
.faq-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .2s ease;
}
.faq-item.open{border-color:var(--border2)}
.faq-q{
  width:100%;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;color:var(--text);font-family:var(--font-body);font-size:.95rem;font-weight:500;
  cursor:pointer;text-align:left;gap:16px;
}
.faq-arrow{transition:transform .3s ease;color:var(--muted);flex-shrink:0;font-size:.8rem}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
  font-size:.9rem;color:var(--muted);line-height:1.65;
}
.faq-item.open .faq-a{max-height:200px}
.faq-a-inner{padding:0 24px 20px}

/* CTA section */
.cta-box{
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:64px 40px;text-align:center;position:relative;overflow:hidden;
}
.cta-box::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(79,158,255,.08) 0%, transparent 60%);
  pointer-events:none;
}

/* Footer */
footer{
  padding:40px 24px;text-align:center;color:var(--muted);font-size:.85rem;
  border-top:1px solid var(--border);position:relative;z-index:1;
}

/* Auth pages */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 24px}
.auth-card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:420px;animation:fadeUp .4s ease;
}
.auth-title{font-family:var(--font-head);font-size:1.8rem;font-weight:800;margin-bottom:8px}
.auth-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.85rem;font-weight:500;margin-bottom:8px;color:var(--text)}
.form-input{
  width:100%;padding:12px 16px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-body);font-size:.9rem;
  transition:all .2s ease;outline:none;
}
.form-input:focus{border-color:var(--accent);background:rgba(79,158,255,.04);box-shadow:0 0 0 3px rgba(79,158,255,.1)}
.form-input::placeholder{color:var(--muted)}
.form-input:disabled{opacity:.5;cursor:not-allowed}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input option{background:var(--card);color:var(--text)}
.form-error{
  padding:12px 16px;border-radius:10px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  color:#ef4444;font-size:.85rem;margin-bottom:16px;
}
.form-success{
  padding:12px 16px;border-radius:10px;
  background:rgba(29,233,182,.1);border:1px solid rgba(29,233,182,.2);
  color:var(--accent3);font-size:.85rem;margin-bottom:16px;
}
.auth-switch{margin-top:24px;text-align:center;font-size:.875rem;color:var(--muted)}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:500}
.auth-switch span:hover{text-decoration:underline}

/* Dashboard */
.dashboard{min-height:100vh;padding:80px 24px 40px;position:relative;z-index:1}
.dashboard-inner{max-width:1200px;margin:0 auto}
.dash-header{margin-bottom:32px;animation:fadeUp .4s ease}
.dash-title{font-family:var(--font-head);font-size:2rem;font-weight:800;margin-bottom:4px}
.dash-sub{color:var(--muted);font-size:.9rem}
.dash-grid{display:grid;grid-template-columns:240px 1fr;gap:24px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}

/* Sidebar */
.dash-sidebar{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;height:fit-content;position:sticky;top:88px;animation:slideIn .4s ease;
}
.sidebar-nav{display:flex;flex-direction:column;gap:4px}
.sidebar-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:10px;
  background:none;border:none;color:var(--muted);font-family:var(--font-body);font-size:.875rem;
  cursor:pointer;transition:all .2s ease;text-align:left;
}
.sidebar-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sidebar-btn.active{background:rgba(79,158,255,.12);color:var(--accent);border:1px solid rgba(79,158,255,.15)}
.sidebar-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-divider{height:1px;background:var(--border);margin:12px 0}
.sidebar-preview{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 14px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);font-size:.85rem;cursor:pointer;text-decoration:none;
  transition:all .2s ease;margin-top:4px;
}
.sidebar-preview:hover{background:rgba(255,255,255,.07);color:var(--text)}

/* Panel */
.dash-panel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;animation:fadeUp .4s ease;
}
.panel-title{font-family:var(--font-head);font-size:1.25rem;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.panel-section{margin-bottom:28px}
.panel-section-title{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}

/* Link in bio editor */
.linker-layout{display:grid;grid-template-columns:1fr 340px;gap:24px}
@media(max-width:1100px){.linker-layout{grid-template-columns:1fr}}
.link-list{display:flex;flex-direction:column;gap:10px}
.link-card{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  transition:all .2s ease;
}
.link-card:hover{border-color:var(--border2);background:rgba(255,255,255,.05)}
.link-drag{cursor:grab;color:var(--muted);font-size:1.1rem;opacity:.5}
.link-info{flex:1;min-width:0}
.link-title-text{font-weight:500;font-size:.9rem;margin-bottom:2px}
.link-url-text{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-edit-inline{flex:1;min-width:0}
.link-edit-inline .form-input{padding:6px 10px;font-size:.85rem;margin-bottom:6px}
.link-actions{display:flex;gap:4px}
.icon-btn{
  width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;cursor:pointer;transition:all .2s ease;font-size:.9rem;color:var(--muted);
}
.icon-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
.icon-btn.red:hover{background:rgba(239,68,68,.12);color:#ef4444}
.icon-btn:disabled{opacity:.25;cursor:not-allowed}
.add-link-form{
  background:rgba(79,158,255,.05);border:1px dashed rgba(79,158,255,.2);
  border-radius:12px;padding:20px;margin-bottom:16px;
}
.add-link-form .form-input{margin-bottom:10px}

/* Live preview */
.preview-phone{
  background:var(--card2);border:1px solid var(--border);border-radius:20px;
  overflow:hidden;position:sticky;top:88px;
}
.preview-header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.preview-title{font-size:.78rem;color:var(--muted);font-weight:500}
.preview-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3)}
.preview-body{
  padding:28px 20px;min-height:400px;
  display:flex;flex-direction:column;align-items:center;
}
.preview-avatar{
  width:72px;height:72px;border-radius:50%;
  background:var(--gradient);margin-bottom:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-size:1.6rem;font-weight:800;color:#fff;
}
.preview-name{font-family:var(--font-head);font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:6px}
.preview-bio{font-size:.8rem;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:20px;max-width:220px}
.preview-link{
  width:100%;padding:11px 16px;border-radius:10px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  font-size:.82rem;text-align:center;margin-bottom:8px;color:var(--text);
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s ease;cursor:pointer;text-decoration:none;
}
.preview-link:hover{background:rgba(255,255,255,.1);border-color:var(--border2)}
.preview-empty{color:var(--muted);font-size:.8rem;text-align:center;padding:20px 0;opacity:.6}

/* Appearance grid */
.bg-options{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.bg-option{
  height:72px;border-radius:10px;border:2px solid var(--border);
  cursor:pointer;transition:all .2s ease;overflow:hidden;position:relative;
}
.bg-option.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,158,255,.2)}
.bg-option:hover{border-color:var(--border2)}
.bg-option-label{
  position:absolute;bottom:6px;left:6px;
  background:rgba(0,0,0,.6);font-size:.7rem;padding:2px 6px;border-radius:4px;
}
.color-swatches{display:flex;flex-wrap:wrap;gap:10px}
.color-swatch{
  width:36px;height:36px;border-radius:8px;border:2px solid transparent;
  cursor:pointer;transition:all .2s ease;
}
.color-swatch.selected{border-color:#fff;transform:scale(1.15)}
.color-swatch:hover{transform:scale(1.1)}

/* Toggle */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;margin-bottom:10px;
}
.toggle-info .toggle-name{font-weight:500;font-size:.9rem;margin-bottom:2px}
.toggle-info .toggle-desc{font-size:.78rem;color:var(--muted)}
.toggle{position:relative;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;inset:0;border-radius:100px;background:var(--border2);cursor:pointer;
  transition:all .3s ease;
}
.toggle-slider::before{
  content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;
  border-radius:50%;background:#fff;transition:all .3s ease;
}
input:checked~.toggle-slider{background:var(--accent)}
input:checked~.toggle-slider::before{transform:translateX(20px)}

/* Save bar */
.save-bar{
  display:flex;align-items:center;justify-content:flex-end;gap:12px;
  padding-top:20px;border-top:1px solid var(--border);margin-top:24px;
}
.save-success{
  display:flex;align-items:center;gap:6px;
  font-size:.875rem;color:var(--accent3);animation:fadeIn .3s ease;
}

/* Public page */
.public-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.public-card{width:100%;max-width:420px;animation:fadeUp .5s ease}
.public-avatar{
  width:88px;height:88px;border-radius:50%;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-size:2rem;font-weight:800;color:#fff;
}
.public-name{font-family:var(--font-head);font-size:1.5rem;font-weight:800;text-align:center;margin-bottom:8px}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, createContext, useContext} = React;

// ── Auth Context ──────────────────────────────────────────────────────────────
const AuthCtx = createContext(null);
function AuthProvider({children}) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const saved = localStorage.getItem('linkhub_user');
    if (saved) try { setUser(JSON.parse(saved)); } catch {}
    setLoading(false);
  }, []);

  const login = async (email, password) => {
    const users = JSON.parse(localStorage.getItem('linkhub_users') || '[]');
    const found = users.find(u => u.email === email && u.password === password);
    if (found) {
      const {password: _, ...safe} = found;
      setUser(safe); localStorage.setItem('linkhub_user', JSON.stringify(safe));
      return true;
    }
    return false;
  };

  const register = async (username, email, password) => {
    const users = JSON.parse(localStorage.getItem('linkhub_users') || '[]');
    if (users.find(u => u.email === email || u.username === username)) return {error: 'Пользователь уже существует'};
    const newUser = {
      id: Date.now().toString(), username, email, password,
      displayName: username, bio: '',
      links: [], theme: {background:'gradient',cardBackground:'#141414',textColor:'#fafafa',accentColor:'#4f9eff',font:'DM Sans'},
      effects: {particles:true,glow:true,animatedBackground:true}
    };
    users.push(newUser);
    localStorage.setItem('linkhub_users', JSON.stringify(users));
    const {password: _, ...safe} = newUser;
    setUser(safe); localStorage.setItem('linkhub_user', JSON.stringify(safe));
    return {success: true};
  };

  const logout = () => { setUser(null); localStorage.removeItem('linkhub_user'); };

  const updateUser = (data) => {
    const users = JSON.parse(localStorage.getItem('linkhub_users') || '[]');
    const idx = users.findIndex(u => u.id === user.id);
    if (idx === -1) return;
    users[idx] = {...users[idx], ...data};
    localStorage.setItem('linkhub_users', JSON.stringify(users));
    const {password: _, ...safe} = users[idx];
    setUser(safe); localStorage.setItem('linkhub_user', JSON.stringify(safe));
  };

  return <AuthCtx.Provider value={{user, loading, login, register, logout, updateUser, isAuthenticated: !!user}}>
    {children}
  </AuthCtx.Provider>;
}
const useAuth = () => useContext(AuthCtx);

// ── Router Context ────────────────────────────────────────────────────────────
const RouterCtx = createContext({page:'home', params:{}});
function RouterProvider({children}) {
  const getState = () => {
    const hash = window.location.hash.replace('#','') || '/';
    const parts = hash.split('?');
    const path = parts[0];
    if (path === '/' || path === '') return {page:'home', params:{}};
    if (path === '/login') return {page:'login', params:{}};
    if (path === '/register') return {page:'register', params:{}};
    if (path === '/dashboard') return {page:'dashboard', params:{}};
    if (path.startsWith('/p/')) return {page:'public', params:{username: path.slice(3)}};
    return {page:'home', params:{}};
  };
  const [state, setState] = useState(getState);
  useEffect(() => {
    const handler = () => setState(getState());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return <RouterCtx.Provider value={state}>{children}</RouterCtx.Provider>;
}
const useRoute = () => useContext(RouterCtx);
const navigate = (path) => { window.location.hash = path; };
const scrollTo = (id) => {
  if (window.location.hash.replace('#','') !== '/') {
    window.location.hash = '/';
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({behavior:'smooth'});
    }, 120);
  } else {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:'smooth'});
  }
};

// ── Nav ───────────────────────────────────────────────────────────────────────
function Nav() {

        <button className="btn btn-ghost" style={{width:'100%'}} onClick={() => { handleLogout(); setMobileOpen(false); }}>Выйти</button>
      </> : <>
        <button className="btn btn-ghost" style={{width:'100%'}} onClick={() => { navigate('/login'); setMobileOpen(false); }}>Войти</button>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={() => { navigate('/register'); setMobileOpen(false); }}>Начать бесплатно</button>
      </>}
    </div>
  </>;
}

// ── Auth Pages ────────────────────────────────────────────────────────────────
function Login() {
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);
  const {login} = useAuth();

  const submit = async () => {
    if (!email||!password) { setErr('Заполните все поля'); return; }
    setLoading(true); setErr('');
    const ok = await login(email, password);
    if (ok) navigate('/dashboard');
    else { setErr('Неверный email или пароль'); setLoading(false); }
  };

  return <div className="auth-page">
    <div className="auth-card">
      <div className="auth-title">Добро пожаловать</div>
      <div className="auth-sub">Войдите в свой аккаунт LinkHub</div>
      {err && <div className="form-error">{err}</div>}
      <div className="form-group">
        <label className="form-label">Email</label>
        <input className="form-input" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <div className="form-group">
        <label className="form-label">Пароль</label>
        <input className="form-input" type="password" placeholder="Ваш пароль" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <button className="btn btn-primary" style={{width:'100%',padding:'12px'}} onClick={submit} disabled={loading}>
        {loading ? <span className="spinner-small"/> : 'Войти'}
      </button>
      <div className="auth-switch">Нет аккаунта? <span onClick={() => navigate('/register')}>Зарегистрироваться</span></div>
    </div>
  </div>;
}

function Register() {
  const [username,setUsername] = useState('');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);
  const {register} = useAuth();

  const submit = async () => {
    if (!username||!email||!password) { setErr('Заполните все поля'); return; }
    if (password.length < 6) { setErr('Пароль минимум 6 символов'); return; }
    if (!/^[a-z0-9_]+$/i.test(username)) { setErr('Логин: только латиница, цифры, _'); return; }
    setLoading(true); setErr('');
    const res = await register(username.toLowerCase(), email, password);
    if (res.success) navigate('/dashboard');
    else { setErr(res.error); setLoading(false); }
  };

  return <div className="auth-page">
    <div className="auth-card">
      <div className="auth-title">Создать аккаунт</div>
      <div className="auth-sub">Начните создавать вашу link-in-bio страницу</div>
      {err && <div className="form-error">{err}</div>}
      <div className="form-group">
        <label className="form-label">Имя пользователя</label>
        <input className="form-input" type="text" placeholder="username" value={username} onChange={e=>setUsername(e.target.value)}/>
        {username && <div style={{fontSize:'.78rem',color:'var(--muted)',marginTop:6}}>Ваша страница: <span style={{color:'var(--accent)'}}>linkhub/p/{username.toLowerCase()}</span></div>}
      </div>
      <div className="form-group">
        <label className="form-label">Email</label>
        <input className="form-input" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
      </div>
      <div className="form-group">
        <label className="form-label">Пароль</label>
        <input className="form-input" type="password" placeholder="Минимум 6 символов" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <button className="btn btn-primary" style={{width:'100%',padding:'12px'}} onClick={submit} disabled={loading}>
        {loading ? <span className="spinner-small"/> : 'Создать аккаунт'}
      </button>
      <div className="auth-switch">Уже есть аккаунт? <span onClick={() => navigate('/login')}>Войти</span></div>
    </div>
  </div>;
}

];

function Dashboard() {
  const {user, isAuthenticated, updateUser} = useAuth();

  const [displayName, setDisplayName] = useState(user?.displayName || '');

  const [links, setLinks] = useState(user?.links || []);
  const [theme, setTheme] = useState(user?.theme || {background:'gradient',accentColor:'#4f9eff',textColor:'#fafafa',font:'DM Sans'});
  const [effects, setEffects] = useState(user?.effects || {particles:true,glow:true,animatedBackground:true});

  // Link form
  const [newTitle, setNewTitle] = useState('');
  const [newUrl, setNewUrl] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editTitle, setEditTitle] = useState('');
  const [editUrl, setEditUrl] = useState('');

  useEffect(() => {
    if (!isAuthenticated) navigate('/login');
  }, [isAuthenticated]);

  const save = async () => {
    setSaving(true);
    updateUser({displayName, bio, links, theme, effects});
    await new Promise(r => setTimeout(r, 500));
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const addLink = () => {
    if (!newTitle || !newUrl) return;
    const url = newUrl.startsWith('http') ? newUrl : 'https://' + newUrl;
    setLinks(prev => [...prev, {id: Date.now().toString(), title: newTitle, url, order: prev.length}]);
    setNewTitle(''); setNewUrl('');
  };

  const removeLink = (id) => setLinks(prev => prev.filter(l => l.id !== id));

  const moveLink = (idx, dir) => {
    const arr = [...links];
    if (dir === 'up' && idx > 0) { [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]]; }
    else if (dir === 'down' && idx < arr.length-1) { [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]]; }
    setLinks(arr);
  };

  const startEdit = (link) => { setEditingId(link.id); setEditTitle(link.title); setEditUrl(link.url); };
  const saveEdit = (id) => {
    setLinks(prev => prev.map(l => l.id===id ? {...l, title:editTitle, url:editUrl.startsWith('http')?editUrl:'https://'+editUrl} : l));
    setEditingId(null);
  };

  const tabs = [
    {id:'profile', label:'Профиль', icon:'👤'},
    {id:'links', label:'Ссылки', icon:'🔗'},
    {id:'appearance', label:'Внешний вид', icon:'🎨'},
    {id:'effects', label:'Эффекты', icon:'✨'},
  ];

  if (!isAuthenticated) return null;

  return <div className="dashboard">
    <div className="dashboard-inner">
      <div className="dash-header">
        <div className="dash-title">Личный кабинет</div>
        <div className="dash-sub">Настройте и редактируйте вашу страницу LinkHub в реальном времени</div>
      </div>

      <div className="dash-grid">
        {/* Sidebar */}
        <aside>
          <div className="dash-sidebar">
            <div className="sidebar-nav">
              {tabs.map(t => <button key={t.id} className={`sidebar-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
                <span className="sidebar-icon">{t.icon}</span>{t.label}
              </button>)}
            </div>
            <div className="sidebar-divider"/>
            <a className="sidebar-preview" href={`#/p/${user?.username}`} target="_blank">
              <span>👁</span> Посмотреть страницу
            </a>
          </div>
        </aside>

        {/* Main panel */}
        <div>
          <div className="dash-panel">

            {/* PROFILE */}
            {tab === 'profile' && <>
              <div className="panel-title">Информация профиля</div>
              <div className="form-group">
                <label className="form-label">Отображаемое имя</label>
                <input className="form-input" type="text" value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="Ваше имя"/>
              </div>
              <div className="form-group">
                <label className="form-label">Имя пользователя</label>
                <div style={{display:'flex',alignItems:'center'}}>
                  <span style={{padding:'12px 16px',background:'rgba(255,255,255,.04)',border:'1px solid var(--border)',borderRight:'none',borderRadius:'10px 0 0 10px',fontSize:'.85rem',color:'var(--muted)',whiteSpace:'nowrap'}}>linkhub/p/</span>
                  <input className="form-input" type="text" value={user?.username} disabled style={{borderRadius:'0 10px 10px 0'}}/>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">О себе</label>
                <textarea className="form-input" value={bio} onChange={e=>setBio(e.target.value)} placeholder="Расскажите о себе..." rows={4}/>
              </div>
              <div className="save-bar">
                {saved && <div className="save-success">✓ Сохранено</div>}
                <button className="btn btn-primary" onClick={save} disabled={saving}>
                  {saving ? <><span className="spinner-small"/> Сохранение...</> : 'Сохранить'}
                </button>
              </div>
            </>}

            {/* LINKS */}
            {tab === 'links' && <>
              <div className="panel-title">Мои ссылки</div>
              <div className="linker-layout">
                <div>
                  {/* Add form */}
                  <div className="add-link-form">
                    <div className="panel-section-title">Добавить ссылку</div>
                    <input className="form-input" type="text" value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Название (напр. Instagram)"/>
                    <input className="form-input" type="text" value={newUrl} onChange={e=>setNewUrl(e.target.value)} placeholder="URL (напр. instagram.com/username)" onKeyDown={e=>e.key==='Enter'&&addLink()}/>
                    <button className="btn btn-primary btn-sm" onClick={addLink}>+ Добавить</button>
                  </div>

                  {/* Link list */}
                  {links.length === 0
                    ? <div style={{textAlign:'center',color:'var(--muted)',padding:'32px 0',fontSize:'.9rem'}}>Пока нет ссылок. Добавьте первую! 👆</div>
                    : <div className="link-list">
                        {links.map((l, i) => <div key={l.id} className="link-card">
                          <span className="link-drag">⠿</span>
                          {editingId === l.id ? <>
                            <div className="link-edit-inline">
                              <input className="form-input" type="text" value={editTitle} onChange={e=>setEditTitle(e.target.value)}/>
                              <input className="form-input" type="text" value={editUrl} onChange={e=>setEditUrl(e.target.value)}/>
                            </div>
                            <div className="link-actions">
                              <button className="icon-btn" onClick={() => saveEdit(l.id)} title="Сохранить">✓</button>
                              <button className="icon-btn" onClick={() => setEditingId(null)} title="Отмена">✕</button>
                            </div>
                          </> : <>
                            <div className="link-info">
                              <div className="link-title-text">{l.title}</div>
                              <div className="link-url-text">{l.url}</div>
                            </div>
                            <div className="link-actions">
                              <button className="icon-btn" onClick={() => moveLink(i,'up')} disabled={i===0} title="Вверх">↑</button>
                              <button className="icon-btn" onClick={() => moveLink(i,'down')} disabled={i===links.length-1} title="Вниз">↓</button>
                              <button className="icon-btn" onClick={() => startEdit(l)} title="Редактировать">✏️</button>
                              <a className="icon-btn" href={l.url} target="_blank" rel="noreferrer" title="Открыть">↗</a>
                              <button className="icon-btn red" onClick={() => removeLink(l.id)} title="Удалить">🗑</button>
                            </div>
                          </>}
                        </div>)}
                      </div>
                  }
                  <div className="save-bar">
                    {saved && <div className="save-success">✓ Сохранено</div>}
                    <button className="btn btn-primary" onClick={save} disabled={saving}>
                      {saving ? <><span className="spinner-small"/> Сохранение...</> : 'Сохранить'}
                    </button>
                  </div>
                </div>
                <LivePreview displayName={displayName} bio={bio} links={links} theme={theme} username={user?.username}/>
              </div>
            </>}

            {/* APPEARANCE */}
            {tab === 'appearance' && <>
              <div className="panel-title">Внешний вид</div>
              <div className="linker-layout">
                <div>
                  <div className="panel-section-title">Фон страницы</div>
                  <div className="bg-options">
                    {BG_OPTIONS.map(bg => <div key={bg.value}
                      className={`bg-option ${theme.background===bg.value?'selected':''}`}
                      style={{background: bg.preview}}
                      onClick={() => setTheme(t => ({...t, background: bg.value}))}>
                      <span className="bg-option-label">{bg.label}</span>
                    </div>)}
                  </div>

                  <div className="panel-section-title" style={{marginTop:24}}>Акцентный цвет</div>
                  <div className="color-swatches">
                    {COLORS.map(c => <div key={c}
                      className={`color-swatch ${theme.accentColor===c?'selected':''}`}
                      style={{background:c}}
                      onClick={() => setTheme(t => ({...t, accentColor:c}))}/>)}
                  </div>

                  <div className="panel-section-title" style={{marginTop:24}}>Шрифт</div>
                  <select className="form-input" value={theme.font} onChange={e => setTheme(t => ({...t, font:e.target.value}))}>
                    {FONTS.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>

                  <div className="save-bar">
                    {saved && <div className="save-success">✓ Сохранено</div>}
                    <button className="btn btn-primary" onClick={save} disabled={saving}>
                      {saving ? <><span className="spinner-small"/> Сохранение...</> : 'Сохранить'}
                    </button>
                  </div>
                </div>
                <LivePreview displayName={displayName} bio={bio} links={links} theme={theme} username={user?.username}/>
              </div>
            </>}

            {/* EFFECTS */}
            {tab === 'effects' && <>
              <div className="panel-title">Визуальные эффекты</div>
              {[
                {key:'particles', name:'Частицы', desc:'Анимированные частицы на фоне'},
                {key:'glow', name:'Свечение', desc:'Эффект свечения у ссылок'},
                {key:'animatedBackground', name:'Анимированный фон', desc:'Плавная анимация фона'},
              ].map(ef => <div key={ef.key} className="toggle-row">
                <div className="toggle-info">
                  <div className="toggle-name">{ef.name}</div>
                  <div className="toggle-desc">{ef.desc}</div>
                </div>
                <label className="toggle">
                  <input type="checkbox" checked={!!effects[ef.key]} onChange={e => setEffects(v => ({...v, [ef.key]:e.target.checked}))}/>
                  <span className="toggle-slider"/>
                </label>
              </div>)}
              <div className="save-bar">
                {saved && <div className="save-success">✓ Сохранено</div>}
                <button className="btn btn-primary" onClick={save} disabled={saving}>
                  {saving ? <><span className="spinner-small"/> Сохранение...</> : 'Сохранить'}
                </button>
              </div>
            </>}

          </div>
        </div>
      </div>
    </div>
  </div>;
}

// ── Public Page ───────────────────────────────────────────────────────────────
function PublicPage({username}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [notFound, setNotFound] = useState(false);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const users = JSON.parse(localStorage.getItem('linkhub_users') || '[]');
    const found = users.find(u => u.username === username);
    if (found) { const {password: _, ...safe} = found; setData(safe); }
    else setNotFound(true);
    setLoading(false);
  }, [username]);

  const copy = async () => {
    try { await navigator.clipboard.writeText(window.location.href); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
  };

  const getBg = () => {
    if (!data) return '#0a0a0a';
    switch(data.theme?.background) {
      case 'gradient': return `linear-gradient(135deg, ${data.theme.accentColor}30, #22d3ee20)`;
      case 'purple': return '#1a0a2e';
      case 'blue': return '#0a1628';
      case 'green': return '#0a1a0f';
      case 'sunset': return 'linear-gradient(135deg,#3d1a00,#1a0a2e)';
      default: return '#0a0a0a';
    }
  };

  if (loading) return <div className="full-center"><div className="spinner"/></div>;
  if (notFound) return <div className="not-found">
    <div><span style={{fontFamily:'var(--font-head)',fontSize:'5rem',fontWeight:800,background:'var(--gradient)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>404</span></div>
    <div style={{color:'var(--muted)'}}>Пользователь не найден</div>
    <button className="btn btn-primary" onClick={() => navigate('/')}>На главную</button>
  </div>;

  const initials = (data.displayName || data.username || '?').slice(0,2).toUpperCase();
  const accent = data.theme?.accentColor || '#4f9eff';

  return <div className="public-page" style={{background: getBg(), minHeight:'100vh', fontFamily: data.theme?.font || 'DM Sans'}}>
    <div className="public-card">
      <div className="public-avatar" style={{background:`linear-gradient(135deg, ${accent}, #22d3ee)`}}>{initials}</div>
      <div className="public-name">{data.displayName || data.username}</div>
      {data.bio && <div className="public-bio">{data.bio}</div>}
      {(data.links || []).map(l => <a key={l.id} className="public-link" href={l.url} target="_blank" rel="noreferrer"
        style={{borderColor:`${accent}30`}}>
        🔗 {l.title}
      </a>)}
      <div className="public-footer">
        <button className="btn btn-ghost btn-sm" style={{marginRight:8}} onClick={copy}>
          {copied ? '✓ Скопировано' : '🔗 Поделиться'}
        </button>
        <br/><br/>
        Сделано на <span onClick={() => navigate('/')}>LinkHub</span>
      </div>
    </div>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function AppShell() {
  const {page, params} = useRoute();
  const {isAuthenticated} = useAuth();
  const showNav = page !== 'public';

  if (page === 'public') return <PublicPage username={params.username}/>;

  return <>
    {showNav && <Nav/>}
    {page === 'home' && <Home/>}
    {page === 'login' && <Login/>}
    {page === 'register' && <Register/>}
    {page === 'dashboard' && <Dashboard/>}
  </>;
}

function App() {
  return <AuthProvider>
    <RouterProvider>
      <AppShell/>
    </RouterProvider>
  </AuthProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
