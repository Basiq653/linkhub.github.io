<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b10;
  --bg2:#0d1117;
  --card:#111820;
  --card2:#16202c;
  --border:#1e2d3d;
  --border2:#253545;
  --text:#e8edf2;
  --muted:#6b8299;
  --accent:#4f9eff;
  --accent2:#7b5ea7;
  --accent3:#1de9b6;
  --gradient:linear-gradient(135deg,#4f9eff,#7b5ea7);
  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --radius:14px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
#root{min-height:100vh}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4
}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes orb{0%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}100%{transform:translate(0,0) scale(1)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px var(--link-glow,rgba(79,158,255,0.4)),0 0 20px var(--link-glow,rgba(79,158,255,0.2))}50%{box-shadow:0 0 16px var(--link-glow,rgba(79,158,255,0.7)),0 0 40px var(--link-glow,rgba(79,158,255,0.4))}}

.anim-fade-up{animation:fadeUp .6s ease both}
.anim-fade-in{animation:fadeIn .4s ease both}
.anim-slide{animation:slideIn .4s ease both}

/* Background orbs */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orb 12s ease-in-out infinite}
.orb1{width:500px;height:500px;background:rgba(79,158,255,.07);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:rgba(123,94,167,.07);bottom:-80px;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:rgba(29,233,182,.05);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-8s}

/* Nav */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  transition:all .3s ease;
}
nav.scrolled{
  background:rgba(8,11,16,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-family:var(--font-head);font-weight:800;font-size:1.25rem;
  background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-decoration:none;cursor:pointer;
}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{
  padding:8px 16px;border-radius:8px;font-size:.9rem;color:var(--muted);
  cursor:pointer;transition:all .2s ease;text-decoration:none;background:none;border:none;font-family:var(--font-body);
}
.nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-actions{display:flex;align-items:center;gap:8px}
.btn{
  padding:9px 20px;border-radius:10px;font-size:.875rem;font-weight:500;cursor:pointer;
  transition:all .2s ease;border:none;font-family:var(--font-body);
}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:rgba(255,255,255,.04)}
.btn-primary{
  background:var(--gradient);color:#fff;
  box-shadow:0 4px 20px rgba(79,158,255,.25);
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 28px rgba(79,158,255,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-sm{padding:7px 14px;font-size:.8rem}
.btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-success{background:rgba(29,233,182,.15);color:var(--accent3);border:1px solid rgba(29,233,182,.2)}
.btn-success:hover{background:rgba(29,233,182,.25)}

.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.burger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s ease}
.mobile-menu{
  display:none;position:fixed;top:64px;left:0;right:0;z-index:99;
  background:rgba(8,11,16,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:16px;
  flex-direction:column;gap:4px;
}
.mobile-menu.open{display:flex}
@media(max-width:768px){
  .nav-links,.nav-actions{display:none}
  .burger{display:flex}
}

/* Hero */
.hero{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:80px 24px 40px;position:relative;z-index:1;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:100px;
  background:rgba(79,158,255,.1);border:1px solid rgba(79,158,255,.2);
  font-size:.8rem;color:var(--accent);margin-bottom:28px;
  animation:fadeUp .5s ease both;
}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite}
h1.hero-title{
  font-family:var(--font-head);font-size:clamp(2.5rem,7vw,5rem);font-weight:800;
  line-height:1.05;letter-spacing:-.03em;margin-bottom:24px;
  animation:fadeUp .6s .1s ease both;
}
.gradient-text{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-subtitle{
  font-size:clamp(1rem,2.5vw,1.2rem);color:var(--muted);max-width:540px;margin:0 auto 40px;
  line-height:1.65;animation:fadeUp .6s .2s ease both;
}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;animation:fadeUp .6s .3s ease both}
.hero-stats{
  display:flex;gap:40px;justify-content:center;flex-wrap:wrap;
  margin-top:64px;padding-top:40px;border-top:1px solid var(--border);
  animation:fadeUp .6s .4s ease both;
}
.stat-item{text-align:center}
.stat-num{font-family:var(--font-head);font-size:2rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.8rem;color:var(--muted);margin-top:2px}

section{padding:100px 24px;position:relative;z-index:1}
.section-inner{max-width:1100px;margin:0 auto}
.section-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:100px;
  background:rgba(79,158,255,.08);border:1px solid rgba(79,158,255,.15);
  font-size:.78rem;color:var(--accent);margin-bottom:20px;font-weight:500;
}
h2.section-title{
  font-family:var(--font-head);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;
  letter-spacing:-.02em;margin-bottom:16px;
}
.section-sub{font-size:1.05rem;color:var(--muted);max-width:480px;line-height:1.6;margin-bottom:60px}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0}

.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.feature-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;transition:all .3s ease;position:relative;overflow:hidden;
}
.feature-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(79,158,255,.06) 0%, transparent 60%);
  opacity:0;transition:opacity .3s ease;
}
.feature-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.feature-card:hover::before{opacity:1}
.feature-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(79,158,255,.12);border:1px solid rgba(79,158,255,.15);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:1.3rem;
}
.feature-title{font-family:var(--font-head);font-weight:700;font-size:1.05rem;margin-bottom:8px}
.feature-desc{font-size:.9rem;color:var(--muted);line-height:1.6}

.faq-list{display:flex;flex-direction:column;gap:12px;max-width:720px}
.faq-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .2s ease;
}
.faq-item.open{border-color:var(--border2)}
.faq-q{
  width:100%;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;
  background:none;border:none;color:var(--text);font-family:var(--font-body);font-size:.95rem;font-weight:500;
  cursor:pointer;text-align:left;gap:16px;
}
.faq-arrow{transition:transform .3s ease;color:var(--muted);flex-shrink:0;font-size:.8rem}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{
  max-height:0;overflow:hidden;transition:max-height .35s ease;
  font-size:.9rem;color:var(--muted);line-height:1.65;
}
.faq-item.open .faq-a{max-height:200px}
.faq-a-inner{padding:0 24px 20px}

.cta-box{
  background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:64px 40px;text-align:center;position:relative;overflow:hidden;
}
.cta-box::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(79,158,255,.08) 0%, transparent 60%);
  pointer-events:none;
}

footer{
  padding:40px 24px;text-align:center;color:var(--muted);font-size:.85rem;
  border-top:1px solid var(--border);position:relative;z-index:1;
}

.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 24px}
.auth-card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:420px;animation:fadeUp .4s ease;
}
.auth-title{font-family:var(--font-head);font-size:1.8rem;font-weight:800;margin-bottom:8px}
.auth-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:.85rem;font-weight:500;margin-bottom:8px;color:var(--text)}
.form-input{
  width:100%;padding:12px 16px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-body);font-size:.9rem;
  transition:all .2s ease;outline:none;
}
.form-input:focus{border-color:var(--accent);background:rgba(79,158,255,.04);box-shadow:0 0 0 3px rgba(79,158,255,.1)}
.form-input::placeholder{color:var(--muted)}
.form-input:disabled{opacity:.5;cursor:not-allowed}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input option{background:var(--card);color:var(--text)}
.form-error{
  padding:12px 16px;border-radius:10px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  color:#ef4444;font-size:.85rem;margin-bottom:16px;
}
.form-success{
  padding:12px 16px;border-radius:10px;
  background:rgba(29,233,182,.1);border:1px solid rgba(29,233,182,.2);
  color:var(--accent3);font-size:.85rem;margin-bottom:16px;
}
.auth-switch{margin-top:24px;text-align:center;font-size:.875rem;color:var(--muted)}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:500}
.auth-switch span:hover{text-decoration:underline}

.dashboard{min-height:100vh;padding:80px 24px 40px;position:relative;z-index:1}
.dashboard-inner{max-width:1400px;margin:0 auto}
.dash-header{margin-bottom:32px;animation:fadeUp .4s ease}
.dash-title{font-family:var(--font-head);font-size:2rem;font-weight:800;margin-bottom:4px}
.dash-sub{color:var(--muted);font-size:.9rem}
.dash-grid{display:grid;grid-template-columns:240px 1fr;gap:24px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}

.dash-sidebar{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;height:fit-content;position:sticky;top:88px;animation:slideIn .4s ease;
}
.sidebar-nav{display:flex;flex-direction:column;gap:4px}
.sidebar-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-radius:10px;
  background:none;border:none;color:var(--muted);font-family:var(--font-body);font-size:.875rem;
  cursor:pointer;transition:all .2s ease;text-align:left;
}
.sidebar-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sidebar-btn.active{background:rgba(79,158,255,.12);color:var(--accent);border:1px solid rgba(79,158,255,.15)}
.sidebar-icon{font-size:1rem;width:20px;text-align:center}
.sidebar-divider{height:1px;background:var(--border);margin:12px 0}
.sidebar-preview{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 14px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--muted);font-size:.85rem;cursor:pointer;text-decoration:none;
  transition:all .2s ease;margin-top:4px;
}
.sidebar-preview:hover{background:rgba(255,255,255,.07);color:var(--text)}

.dash-panel{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;animation:fadeUp .4s ease;
}
.panel-title{font-family:var(--font-head);font-size:1.25rem;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.panel-section{margin-bottom:28px}
.panel-section-title{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}

/* NEW: Card Settings Grid Layout */
.settings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
@media(max-width:1100px){.settings-grid{grid-template-columns:1fr}}
.settings-card{
  background:var(--card2);border:1px solid var(--border);border-radius:16px;
  padding:20px;transition:all .3s ease;
}
.settings-card:hover{border-color:var(--border2)}
.settings-card-title{
  font-family:var(--font-head);font-size:1rem;font-weight:600;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;color:var(--text);
}

/* Media Upload Grid */
.media-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.media-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.media-grid{grid-template-columns:1fr}}
.media-card{
  background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:16px;position:relative;overflow:hidden;min-height:120px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;transition:all .2s ease;
}
.media-card:hover{border-color:var(--accent)}
.media-card.has-media{background:var(--card);border-color:var(--accent)}
.media-card-preview{
  width:100%;height:80px;border-radius:8px;object-fit:cover;
  border:1px solid var(--border);
}
.media-card-label{
  font-size:.8rem;color:var(--muted);font-weight:500;
}
.media-card input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.media-remove{
  position:absolute;top:8px;right:8px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(239,68,68,.9);color:#fff;border:none;
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
  z-index:10;transition:all .2s;
}
.media-remove:hover{background:#ef4444;transform:scale(1.1)}

/* Form Elements */
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-control{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;color:var(--text);
  font-family:var(--font-body);font-size:.9rem;transition:all .2s;outline:none;width:100%;
}
.form-control:focus{border-color:var(--accent);background:rgba(79,158,255,.04);box-shadow:0 0 0 3px rgba(79,158,255,.1)}
.form-control::placeholder{color:var(--muted)}

/* Color Pickers */
.color-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.color-item{display:flex;flex-direction:column;gap:8px}
.color-label{font-size:.85rem;color:var(--muted);font-weight:500}
.color-picker-wrapper{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;
}
.color-preview{
  width:32px;height:32px;border-radius:8px;border:2px solid var(--border);
  cursor:pointer;flex-shrink:0;
}
.color-input{
  background:transparent;border:none;color:var(--text);
  font-family:monospace;font-size:.9rem;width:100%;outline:none;
}
.color-edit{
  width:28px;height:28px;border-radius:6px;
  background:var(--border);border:none;color:var(--muted);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.color-edit:hover{background:var(--accent);color:#fff}

/* Range Sliders */
.range-control{margin-bottom:20px}
.range-label{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.85rem;color:var(--muted);margin-bottom:8px;
}
.range-value{
  background:rgba(79,158,255,.15);color:var(--accent);
  padding:2px 10px;border-radius:100px;font-size:.75rem;font-weight:600;
}
.range-slider{
  width:100%;height:6px;border-radius:3px;
  background:var(--border2);outline:none;-webkit-appearance:none;
}
.range-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--accent);cursor:pointer;box-shadow:0 2px 8px rgba(79,158,255,.4);
  transition:all .2s;
}
.range-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}

/* Toggle Switches */
.toggle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, createContext, useContext} = React;

// ── Firebase Config Check ─────────────────────────────────────────────────────
function FirebaseSetupBanner() {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const timer = setTimeout(() => {
      if (!window.__firebase || window.__firebase?.auth?.app?.options?.apiKey === 'YOUR_API_KEY') {
        setVisible(true);
      }
    }, 800);
    return () => clearTimeout(timer);
  }, []);
  if (!visible) return null;
  return <div style={{
    position:'fixed',top:0,left:0,right:0,zIndex:9999,
    background:'linear-gradient(135deg,#1a0a00,#2a1500)',
    border:'1px solid rgba(251,146,60,.4)',
    padding:'20px 24px',
    display:'flex',alignItems:'flex-start',gap:'16px'
  }}>
    <span style={{fontSize:'1.5rem',flexShrink:0}}>🔥</span>
    <div style={{flex:1}}>
      <div style={{fontFamily:'var(--font-head)',fontWeight:700,fontSize:'1rem',color:'#fb923c',marginBottom:'8px'}}>
        Настройте Firebase
      </div>
      <div style={{fontSize:'.85rem',color:'rgba(255,255,255,.7)',lineHeight:1.7}}>
        Данные сейчас не сохраняются. Чтобы подключить Firebase:
        <br/>
        <b style={{color:'#fbbf24'}}>1.</b> Перейдите на <a href="https://console.firebase.google.com" target="_blank" style={{color:'#fb923c'}}>console.firebase.google.com</a> → создайте проект
        <br/>
        <b style={{color:'#fbbf24'}}>2.</b> Включите <b>Authentication → Email/Password</b> и <b>Firestore Database</b>
        <br/>
        <b style={{color:'#fbbf24'}}>3.</b> Откройте этот файл в текстовом редакторе, найдите <code style={{background:'rgba(255,255,255,.1)',padding:'1px 6px',borderRadius:'4px'}}>const firebaseConfig</code> и вставьте ваши данные
      </div>
    </div>
    <button onClick={() => setVisible(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,.5)',fontSize:'1.2rem',cursor:'pointer',flexShrink:0}}>✕</button>
  </div>;
}

// ── Link icon detection ───────────────────────────────────────────────────────
const getLinkIcon = (title, url) => {
  const t = (title || '').toLowerCase();
  const u = (url || '').toLowerCase();
  if (t.includes('instagram') || u.includes('instagram')) return '📸';
  if (t.includes('tiktok') || u.includes('tiktok')) return '🎵';
  if (t.includes('youtube') || u.includes('youtube') || u.includes('youtu.be')) return '▶️';
  if (t.includes('twitter') || t.includes('x.com') || u.includes('twitter') || u.includes('x.com')) return '𝕏';
  if (t.includes('telegram') || u.includes('t.me') || u.includes('telegram')) return '✈️';
  if (t.includes('vk') || u.includes('vk.com')) return '💬';
  if (t.includes('discord') || u.includes('discord')) return '🎮';
  if (t.includes('twitch') || u.includes('twitch')) return '🟣';
  if (t.includes('spotify') || u.includes('spotify')) return '🎧';
  if (t.includes('github') || u.includes('github')) return '💻';
  if (t.includes('linkedin') || u.includes('linkedin')) return '💼';
  if (t.includes('facebook') || u.includes('facebook')) return '👥';
  if (t.includes('whatsapp') || u.includes('whatsapp')) return '📱';
  if (t.includes('email') || t.includes('почта') || u.includes('mailto')) return '✉️';
  if (t.includes('сайт') || t.includes('website') || t.includes('сайта')) return '🌐';
  if (t.includes('магазин') || t.includes('shop') || t.includes('store')) return '🛒';
  if (t.includes('blog') || t.includes('блог')) return '📝';
  return '🔗';
};

// ── Particles ─────────────────────────────────────────────────────────────────
function ParticlesCanvas({type, color}) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const particlesRef = useRef([]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const count = type === 'snow' ? 80 : type === 'rain' ? 120 : 60;
    particlesRef.current = Array.from({length: count}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: type === 'rain' ? Math.random() * 1.5 + 0.5 : Math.random() * 3 + 1,
      speedX: type === 'wind' ? Math.random() * 4 + 2 : type === 'rain' ? Math.random() * 1 - 0.3 : Math.random() * 0.5 - 0.25,
      speedY: type === 'rain' ? Math.random() * 10 + 8 : type === 'wind' ? Math.random() * 1 - 0.5 : Math.random() * 0.8 + 0.2,
      opacity: Math.random() * 0.6 + 0.2,
      length: type === 'rain' ? Math.random() * 15 + 8 : 0,
      angle: type === 'wind' ? Math.random() * 20 - 10 : 0,
    }));

    const hex2rgb = (hex) => {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    };
    const rgb = hex2rgb(color || '#4f9eff');

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesRef.current.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.opacity;
        if (type === 'snow') {
          ctx.fillStyle = `rgba(${rgb},0.8)`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (type === 'rain') {
          ctx.strokeStyle = `rgba(${rgb},0.6)`;
          ctx.lineWidth = p.size;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x + p.speedX * 2, p.y + p.length);
          ctx.stroke();
        } else if (type === 'wind') {
          ctx.strokeStyle = `rgba(${rgb},0.4)`;
          ctx.lineWidth = p.size * 0.5;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x - p.speedX * 8, p.y + p.angle);
          ctx.stroke();
          ctx.fillStyle = `rgba(${rgb},0.6)`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        p.x += p.speedX;
        p.y += p.speedY;

        if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
        if (p.x > canvas.width + 20) { p.x = -20; }
        if (p.x < -20) { p.x = canvas.width + 20; }
      });
      animRef.current = requestAnimationFrame(draw);
    };
    draw();

    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [type, color]);

  return <canvas ref={canvasRef} id="particles-canvas" style={{position:'fixed',inset:0,zIndex:2,pointerEvents:'none'}}/>;
}

// ── Auth Context (Firebase) ───────────────────────────────────────────────────
const AuthCtx = createContext(null);
function AuthProvider({children}) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  // Ждём инициализации Firebase
  const getFirebase = () => {
    if (!window.__firebase) throw new Error('Firebase не инициализирован. Вставьте свой firebaseConfig.');
    return window.__firebase;
  };

  useEffect(() => {
    // Ждём пока модуль Firebase загрузится
    const waitForFirebase = (attempts = 0) => {
      if (window.__firebase) {
        const { auth, onAuthStateChanged, db, doc, getDoc } = window.__firebase;
        const unsub = onAuthStateChanged(auth, async (firebaseUser) => {
          if (firebaseUser) {
            try {
              const snap = await getDoc(doc(db, 'users', firebaseUser.uid));
              if (snap.exists()) {
                setUser({ id: firebaseUser.uid, email: firebaseUser.email, ...snap.data() });
              } else {
                setUser({ id: firebaseUser.uid, email: firebaseUser.email });
              }
            } catch(e) { setUser({ id: firebaseUser.uid, email: firebaseUser.email }); }
          } else {
            setUser(null);
          }
          setLoading(false);
        });
        return unsub;
      } else if (attempts < 20) {
        setTimeout(() => waitForFirebase(attempts + 1), 200);
      } else {
        setLoading(false);
      }
    };
    const unsub = waitForFirebase();
    return () => { if (typeof unsub === 'function') unsub(); };
  }, []);

  const login = async (email, password) => {
    try {
      const { auth, signInWithEmailAndPassword, db, doc, getDoc } = getFirebase();
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const snap = await getDoc(doc(db, 'users', cred.user.uid));
      const data = snap.exists() ? snap.data() : {};
      const safe = { id: cred.user.uid, email: cred.user.email, ...data };
      setUser(safe);
      return true;
    } catch(e) {
      console.error('Login error:', e);
      return false;
    }
  };

  const register = async (username, email, password) => {
    try {
      const { auth, createUserWithEmailAndPassword, db, doc, setDoc, getDoc } = getFirebase();
      // Проверка уникальности username через Firestore (по username doc)
      const unameSnap = await getDoc(doc(db, 'usernames', username));
      if (unameSnap.exists()) return { error: 'Имя пользователя уже занято' };

      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const newUser = {
        username, email,
        displayName: username, bio: '',
        links: [],
        theme: {
          background:'gradient',
          cardBackground:'#141414',
          textColor:'#fafafa',
          accentColor:'#4f9eff',
          secondaryColor:'#7b5ea7',
          font:'DM Sans',
          cardOpacity: 80,
          cardBlur: 0,
          profileBlur: 0
        },
        effects: {
          particles:true,
          particleType:'snow',
          glow:true,
          animatedBackground:true,
          animatedTitle:false,
          monochromeIcons:false,
          volumeControl:false
        },
        profilePhoto: null,
        bgPhoto: null,
        music: null,
        location: 'Не указано',
        discordPresence: false
      };
      await setDoc(doc(db, 'users', cred.user.uid), newUser);
      await setDoc(doc(db, 'usernames', username), { uid: cred.user.uid });
      const safe = { id: cred.user.uid, ...newUser };
      setUser(safe);
      return { success: true };
    } catch(e) {
      console.error('Register error:', e);
      if (e.code === 'auth/email-already-in-use') return { error: 'Email уже используется' };
      if (e.code === 'auth/weak-password') return { error: 'Пароль слишком короткий (минимум 6 символов)' };
      return { error: 'Ошибка регистрации: ' + e.message };
    }
  };

  const logout = async () => {
    const { auth, signOut } = getFirebase();
    await signOut(auth);
    setUser(null);
  };

  const updateUser = async (data) => {
    try {
      const { db, doc, updateDoc } = getFirebase();
      await updateDoc(doc(db, 'users', user.id), data);
      setUser(prev => ({ ...prev, ...data }));
    } catch(e) {
      console.error('UpdateUser error:', e);
    }
  };

  if (loading) return <div className="full-center"><div className="spinner"/></div>;

  return <AuthCtx.Provider value={{user, loading, login, register, logout, updateUser, isAuthenticated: !!user}}>
    {children}
  </AuthCtx.Provider>;
}
const useAuth = () => useContext(AuthCtx);

// ── Router Context ────────────────────────────────────────────────────────────
const RouterCtx = createContext({page:'home', params:{}});
function RouterProvider({children}) {
  const getState = () => {
    const hash = window.location.hash.replace('#','') || '/';
    const parts = hash.split('?');
    const path = parts[0];
    if (path === '/' || path === '') return {page:'home', params:{}};
    if (path === '/login') return {page:'login', params:{}};
    if (path === '/register') return {page:'register', params:{}};
    if (path === '/dashboard') return {page:'dashboard', params:{}};
    if (path.startsWith('/p/')) return {page:'public', params:{username: path.slice(3)}};
    return {page:'home', params:{}};
  };
  const [state, setState] = useState(getState);
  useEffect(() => {
    const handler = () => setState(getState());
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return <RouterCtx.Provider value={state}>{children}</RouterCtx.Provider>;
}
const useRoute = () => useContext(RouterCtx);
const navigate = (path) => { window.location.hash = path; };
const scrollTo = (id) => {
  if (window.location.hash.replace('#','') !== '/') {
    window.location.hash = '/';
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({behavior:'smooth'});
    }, 120);
  } else {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:'smooth'});
  }
};

function Login() {
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [error,setError] = useState('');
  const [loading,setLoading] = useState(false);
  const {login} = useAuth();

  const submit = async () => {
    if (!email || !password) { setError('Заполните все поля'); return; }
    setLoading(true); setError('');
    const ok = await login(email, password);
    setLoading(false);
    if (ok) navigate('/dashboard');
    else setError('Неверный email или пароль');
  };

  return <div className="auth-page">
    <div className="auth-card">
      <div className="auth-title">Добро пожаловать</div>
      <div className="auth-sub">Войдите в свой аккаунт LinkHub</div>
      {error && <div className="form-error">{error}</div>}
      <div className="form-group">
        <label className="form-label">Email</label>
        <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <div className="form-group">
        <label className="form-label">Пароль</label>
        <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <button className="btn btn-primary" style={{width:'100%'}} onClick={submit} disabled={loading}>
        {loading ? <><span className="spinner-small"/> Вход...</> : 'Войти'}
      </button>
      <div className="auth-switch">Нет аккаунта? <span onClick={() => navigate('/register')}>Зарегистрироваться</span></div>
    </div>
  </div>;
}

function Register() {
  const [username,setUsername] = useState('');
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [error,setError] = useState('');
  const [loading,setLoading] = useState(false);
  const {register} = useAuth();

  const submit = async () => {
    if (!username || !email || !password) { setError('Заполните все поля'); return; }
    if (!/^[a-z0-9_]{3,20}$/.test(username)) { setError('Имя пользователя: 3-20 символов, только латиница и цифры'); return; }
    setLoading(true); setError('');
    const res = await register(username, email, password);
    setLoading(false);
    if (res.success) navigate('/dashboard');
    else setError(res.error || 'Ошибка');
  };

  return <div className="auth-page">
    <div className="auth-card">
      <div className="auth-title">Создать страницу</div>
      <div className="auth-sub">Зарегистрируйтесь — это бесплатно</div>
      {error && <div className="form-error">{error}</div>}
      <div className="form-group">
        <label className="form-label">Имя пользователя</label>
        <input className="form-input" type="text" value={username} onChange={e=>setUsername(e.target.value.toLowerCase())} placeholder="your_username"/>
      </div>
      <div className="form-group">
        <label className="form-label">Email</label>
        <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/>
      </div>
      <div className="form-group">
        <label className="form-label">Пароль</label>
        <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Минимум 6 символов" onKeyDown={e=>e.key==='Enter'&&submit()}/>
      </div>
      <button className="btn btn-primary" style={{width:'100%'}} onClick={submit} disabled={loading}>
        {loading ? <><span className="spinner-small"/> Создание...</> : 'Создать аккаунт'}
      </button>
      <div className="auth-switch">Уже есть аккаунт? <span onClick={() => navigate('/login')}>Войти</span></div>
    </div>
  </div>;
}

        type="text" 
        className="color-input" 
        value={value} 
        onChange={(e) => onChange(e.target.value)}
      />
      <button className="color-edit" onClick={() => setIsOpen(!isOpen)}>✎</button>
    </div>
    {isOpen && (
      <div style={{
        position: 'absolute', zIndex: 100, marginTop: '8px',
        background: 'var(--card)', border: '1px solid var(--border)',
        borderRadius: '12px', padding: '12px', boxShadow: '0 8px 32px rgba(0,0,0,.4)'
      }}>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '8px'}}>
          {['#4f9eff','#7b5ea7','#1de9b6','#f59e0b','#ef4444','#ec4899','#8b5cf6','#10b981','#f97316','#ffffff','#000000','#1a1a1a','#0a0a0a','#141414','#080808'].map(c => (
            <div key={c} style={{
              width: '32px', height: '32px', borderRadius: '6px', background: c,
              cursor: 'pointer', border: value === c ? '2px solid var(--accent)' : '2px solid transparent'
            }} onClick={() => { onChange(c); setIsOpen(false); }}/>
          ))}
        </div>
        <input 
          type="color" 
          value={value} 
          onChange={(e) => onChange(e.target.value)}
          style={{width: '100%', marginTop: '12px', height: '40px', border: 'none', borderRadius: '8px'}}
        />
      </div>
    )}
  </div>;
}

function Dashboard() {
  const {user, isAuthenticated, updateUser} = useAuth();
  const [tab, setTab] = useState('settings');
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  // Profile state
  const [displayName, setDisplayName] = useState(user?.displayName || '');
  const [bio, setBio] = useState(user?.bio || '');
  const [links, setLinks] = useState(user?.links || []);
  const [location, setLocation] = useState(user?.location || 'Не указано');
  
  // Theme state
  const [theme, setTheme] = useState(user?.theme || {
    background:'gradient',
    cardBackground:'#141414',
    textColor:'#fafafa',
    accentColor:'#4f9eff',
    secondaryColor:'#7b5ea7',
    font:'DM Sans',
    cardOpacity: 80,
    cardBlur: 0,
    profileBlur: 0
  });
  
  // Effects state
  const [effects, setEffects] = useState(user?.effects || {
    particles:true,
    particleType:'snow',
    glow:true,
    animatedBackground:true,
    animatedTitle:false,
    monochromeIcons:false,
    volumeControl:false
  });
  
  // Media state
  const [profilePhoto, setProfilePhoto] = useState(user?.profilePhoto || null);
  const [bgPhoto, setBgPhoto] = useState(user?.bgPhoto || null);
  const [music, setMusic] = useState(user?.music || null);
  const [customCursor, setCustomCursor] = useState(user?.customCursor || null);

  // Links editing
  const [newTitle, setNewTitle] = useState('');
  const [newUrl, setNewUrl] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editTitle, setEditTitle] = useState('');
  const [editUrl, setEditUrl] = useState('');

  useEffect(() => {
    if (!isAuthenticated) navigate('/login');
  }, [isAuthenticated]);

  const save = async () => {
    setSaving(true);
    updateUser({
      displayName, bio, links, theme, effects, 
      profilePhoto, bgPhoto, music, customCursor, location
    });
    await new Promise(r => setTimeout(r, 500));
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const addLink = () => {
    if (!newTitle || !newUrl) return;
    const url = newUrl.startsWith('http') ? newUrl : 'https://' + newUrl;
    setLinks(prev => [...prev, {id: Date.now().toString(), title: newTitle, url, order: prev.length}]);
    setNewTitle(''); setNewUrl('');
  };

  const removeLink = (id) => setLinks(prev => prev.filter(l => l.id !== id));
  const moveLink = (idx, dir) => {
    const arr = [...links];
    if (dir === 'up' && idx > 0) { [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]]; }
    else if (dir === 'down' && idx < arr.length-1) { [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]]; }
    setLinks(arr);
  };

  const startEdit = (link) => { setEditingId(link.id); setEditTitle(link.title); setEditUrl(link.url); };
  const saveEdit = (id) => {
    setLinks(prev => prev.map(l => l.id===id ? {...l, title:editTitle, url:editUrl.startsWith('http')?editUrl:'https://'+editUrl} : l));
    setEditingId(null);
  };

  const handlePhotoUpload = (e, type) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      if (type === 'profile') setProfilePhoto(ev.target.result);
      else if (type === 'bg') setBgPhoto(ev.target.result);
      else if (type === 'cursor') setCustomCursor(ev.target.result);
    };
    reader.readAsDataURL(file);
  };

  const handleMusicUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      setMusic({name: file.name.replace(/\.[^/.]+$/,''), data: ev.target.result, type: file.type});
    };
    reader.readAsDataURL(file);
  };

  const updateTheme = (key, value) => {
    setTheme(prev => ({...prev, [key]: value}));
  };

  const updateEffects = (key, value) => {
    setEffects(prev => ({...prev, [key]: value}));
  };

  const tabs = [
    {id:'settings', label:'Настройки', icon:'⚙️'},
    {id:'links', label:'Ссылки', icon:'🔗'},
    {id:'share', label:'Поделиться', icon:'📤'},
  ];

  if (!isAuthenticated) return null;

  return <div className="dashboard">
    <div className="dashboard-inner">
      <div className="dash-header">
        <div className="dash-title">Личный кабинет</div>
        <div className="dash-sub">Настройте и редактируйте вашу страницу LinkHub в реальном времени</div>
      </div>

      <div className="dash-grid">
        <aside>
          <div className="dash-sidebar">
            <div className="sidebar-nav">
              {tabs.map(t => <button key={t.id} className={`sidebar-btn ${tab===t.id?'active':''}`} onClick={() => setTab(t.id)}>
                <span className="sidebar-icon">{t.icon}</span>{t.label}
              </button>)}
            </div>
            <div className="sidebar-divider"/>
            <a className="sidebar-preview" href={`#/p/${user?.username}`} target="_blank">
              <span>👁</span> Посмотреть страницу
            </a>
          </div>
        </aside>

        <div>
          <div className="dash-panel">

            {/* SETTINGS TAB - New Card Style Layout */}
            {tab === 'settings' && <>
              <div className="panel-title">Настройка карточки</div>
              
              {/* Media Upload Grid */}
              <div className="media-grid">
                <div className={`media-card ${bgPhoto ? 'has-media' : ''}`}>
                  {bgPhoto && <button className="media-remove" onClick={() => setBgPhoto(null)}>✕</button>}
                  <input type="file" accept="image/*" onChange={e=>handlePhotoUpload(e,'bg')}/>
                  {bgPhoto ? (
                    <img src={bgPhoto} className="media-card-preview" alt="bg"/>
                  ) : (
                    <>
                      <div style={{fontSize:'1.5rem'}}>🖼</div>
                      <span className="media-card-label">Фон</span>
                    </>
                  )}
                </div>
                
                <div className={`media-card ${music ? 'has-media' : ''}`}>
                  {music && <button className="media-remove" onClick={() => setMusic(null)}>✕</button>}
                  <input type="file" accept="audio/*" onChange={handleMusicUpload}/>
                  {music ? (
                    <>
                      <div style={{fontSize:'1.5rem'}}>🎵</div>
                      <span className="media-card-label" style={{fontSize:'.7rem'}}>{music.name}</span>
                    </>
                  ) : (
                    <>
                      <div style={{fontSize:'1.5rem'}}>🎵</div>
                      <span className="media-card-label">Аудио</span>
                    </>
                  )}
                </div>
                
                <div className={`media-card ${profilePhoto ? 'has-media' : ''}`}>
                  {profilePhoto && <button className="media-remove" onClick={() => setProfilePhoto(null)}>✕</button>}
                  <input type="file" accept="image/*" onChange={e=>handlePhotoUpload(e,'profile')}/>
                  {profilePhoto ? (
                    <img src={profilePhoto} className="media-card-preview" style={{borderRadius:'50%',width:'60px',height:'60px'}} alt="avatar"/>
                  ) : (
                    <>
                      <div style={{fontSize:'1.5rem'}}>👤</div>
                      <span className="media-card-label">Аватар</span>
                    </>
                  )}
                </div>
                
                <div className={`media-card ${customCursor ? 'has-media' : ''}`}>
                  {customCursor && <button className="media-remove" onClick={() => setCustomCursor(null)}>✕</button>}
                  <input type="file" accept="image/*" onChange={e=>handlePhotoUpload(e,'cursor')}/>
                  {customCursor ? (
                    <img src={customCursor} style={{width:'32px',height:'32px'}} alt="cursor"/>
                  ) : (
                    <>
                      <div style={{fontSize:'1.5rem'}}>🖱</div>
                      <span className="media-card-label">Курсор</span>
                    </>
                  )}
                </div>
              </div>

              {/* Settings Grid */}
              <div className="settings-grid">
                {/* General Settings */}
                <div className="settings-card">
                  <div className="settings-card-title">📋 Общие настройки</div>
                  
                  <div className="form-row">
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Описание</label>
                      <div style={{position:'relative'}}>
                        <span style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}>A</span>
                        <input 
                          type="text" 
                          className="form-control" 
                          value={bio} 
                          onChange={e=>setBio(e.target.value)}
                          placeholder="это мое описание"
                          style={{paddingLeft:'32px'}}
                        />
                      </div>
                    </div>
                    
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Discord Presence</label>
                      <div style={{display:'flex',gap:'8px'}}>
                        <select 
                          className="select-control" 
                          value={effects.discordPresence ? 'on' : 'off'}
                          onChange={e => updateEffects('discordPresence', e.target.value === 'on')}
                          style={{flex:1}}
                        >
                          <option value="off">Выключено</option>
                          <option value="on">Включено</option>
                        </select>
                        <button className="icon-btn" style={{background:'rgba(255,255,255,.05)'}}>⚙</button>
                      </div>
                    </div>
                  </div>

                  <div className="form-row">
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Эффекты фона</label>
                      <select 
                        className="select-control"
                        value={effects.particleType}
                        onChange={e => {
                          updateEffects('particleType', e.target.value);
                          updateEffects('particles', e.target.value !== 'none');
                        }}
                      >
                        <option value="none">Нет</option>
                        <option value="snow">❄️ Снег</option>
                        <option value="rain">🌧 Дождь</option>
                        <option value="wind">🌬 Ветер</option>

                    </div>
                    
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Эффекты ника</label>
                      <button className="form-control" style={{textAlign:'left',display:'flex',alignItems:'center',gap:'8px'}}>
                        <span>✨</span> Эффекты ника
                      </button>
                    </div>
                  </div>

                  <div className="form-row">
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Прозрачность профиля</label>
                      <div className="range-control">
                        <div className="range-label">
                          <span></span>
                          <span className="range-value">{theme.cardOpacity}%</span>
                        </div>
                        <input 
                          type="range" 
                          className="range-slider"
                          min="0" max="100" 
                          value={theme.cardOpacity}
                          onChange={e => updateTheme('cardOpacity', parseInt(e.target.value))}
                        />
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.7rem',color:'var(--muted)',marginTop:'4px'}}>
                          <span>20%</span><span>50%</span><span>80%</span>
                        </div>
                      </div>
                    </div>
                    
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Размытие профиля</label>
                      <div className="range-control">
                        <div className="range-label">
                          <span></span>
                          <span className="range-value">{theme.profileBlur}px</span>
                        </div>
                        <input 
                          type="range" 
                          className="range-slider"
                          min="0" max="80" 
                          value={theme.profileBlur}
                          onChange={e => updateTheme('profileBlur', parseInt(e.target.value))}
                        />
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.7rem',color:'var(--muted)',marginTop:'4px'}}>
                          <span>20px</span><span>50px</span><span>80px</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="form-row">
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Местоположение</label>
                      <div style={{position:'relative'}}>
                        <span style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}>📍</span>
                        <select 
                          className="select-control" 
                          value={location}
                          onChange={e => setLocation(e.target.value)}
                          style={{paddingLeft:'32px'}}
                        >
                          {LOCATIONS.map(l => <option key={l} value={l}>{l}</option>)}
                        </select>
                      </div>
                    </div>
                    
                    <div>
                      <label className="form-label" style={{fontSize:'.8rem',color:'var(--muted)',marginBottom:'6px',display:'block'}}>Настройки свечения</label>
                      <div className="glow-options">
                        {['Ник', 'Соцсети', 'Бейджи'].map(g => (
                          <button 
                            key={g} 
                            className={`glow-btn ${effects.glow ? 'active' : ''}`}
                            onClick={() => updateEffects('glow', !effects.glow)}
                          >
                            ✨ {g}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                {/* Color Settings */}
                <div className="settings-card">
                  <div className="settings-card-title">🎨 Настройка цветов</div>
                  
                  <div className="color-grid">
                    <ColorPicker 
                      label="Акцентный цвет" 
                      value={theme.accentColor} 
                      onChange={(v) => updateTheme('accentColor', v)}
                    />
                    <ColorPicker 
                      label="Цвет текста" 
                      value={theme.textColor} 
                      onChange={(v) => updateTheme('textColor', v)}
                    />
                    <ColorPicker 
                      label="Цвет фона" 
                      value={theme.cardBackground} 
                      onChange={(v) => updateTheme('cardBackground', v)}
                    />
                    <ColorPicker 
                      label="Цвет иконок" 
                      value={theme.secondaryColor} 
                      onChange={(v) => updateTheme('secondaryColor', v)}
                    />
                  </div>

                  <button 
                    className="btn btn-success" 
                    style={{width:'100%',marginTop:'16px',padding:'12px'}}
                    onClick={() => updateTheme('background', theme.background === 'gradient' ? 'dark' : 'gradient')}
                  >
                    {theme.background === 'gradient' ? 'Выключить градиент профиля' : 'Включить градиент профиля'}
                  </button>

                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'16px'}}>
                    <div>
                      <span className="color-label">Основной цвет</span>
                      <div className="color-picker-wrapper">
                        <div className="color-preview" style={{background: theme.accentColor}}/>
                        <input type="text" className="color-input" value={theme.accentColor} readOnly/>
                        <button className="color-edit">✎</button>
                      </div>
                    </div>
                    <div>
                      <span className="color-label">Дополнительный цвет</span>
                      <div className="color-picker-wrapper">
                        <div className="color-preview" style={{background: theme.secondaryColor}}/>
                        <input type="text" className="color-input" value={theme.secondaryColor} readOnly/>

                      </div>

                  </div>
                </div>

                      <input type="checkbox" checked={effects.animatedBackground} onChange={e => updateEffects('animatedBackground', e.target.checked)}/>

                    </label>

                      <input type="checkbox" checked={effects.volumeControl} onChange={e => updateEffects('volumeControl', e.target.checked)}/>

                  </div>

                      <input type="checkbox" checked={!!user?.discordAvatar} onChange={() => {}}/>
                      <span className="switch-slider"/>
                    </label>
                  </div>
                  
                  <div className={`toggle-card ${user?.discordDecor ? 'active' : ''}`}>
                    <div className="toggle-info">
                      <div className="toggle-title">Декор аватара Discord</div>

                      <input type="checkbox" checked={!!user?.discordDecor} onChange={() => {}}/>
                      <span className="switch-slider"/>

                  </div>

              </div>

              <div className="save-bar">
                {saved && <div className="save-success">✓ Сохранено</div>}
                <button className="btn btn-primary" onClick={save} disabled={saving}>
                  {saving ? <><span className="spinner-small"/> Сохранение...</> : 'Сохранить настройки'}
                </button>
              </div>

              <div style={{marginTop:'24px'}}>

                  displayName={displayName}

                  username={user?.username} 
                  profilePhoto={profilePhoto} 
                  effects={effects} 
                  music={music}

                            <div className="link-info">

                              <div className="link-url-text">{l.url}</div>
                            </div>
                            <div className="link-actions">
                              <button className="icon-btn" onClick={() => moveLink(i,'up')} disabled={i===0}>↑</button>

                              <button className="icon-btn" onClick={() => startEdit(l)}>✏️</button>
                              <a className="icon-btn" href={l.url} target="_blank" rel="noreferrer">↗</a>
                              <button className="icon-btn red" onClick={() => removeLink(l.id)}>🗑</button>
                            </div>
                          </>}
                        </div>)}
                      </div>
                  }
                  <div className="save-bar">
                    {saved && <div className="save-success">✓ Сохранено</div>}
                    <button className="btn btn-primary" onClick={save} disabled={saving}>
                      {saving ? <><span className="spinner-small"/> Сохранение...</> : 'Сохранить'}
                    </button>
                  </div>
                </div>
                <LivePreview 
                  displayName={displayName} 
                  bio={bio} 
                  links={links} 
                  theme={theme} 
                  username={user?.username} 
                  profilePhoto={profilePhoto} 
                  effects={effects} 
                  music={music}
                />
              </div>
            </>}

            {/* SHARE TAB */}
            {tab === 'share' && <>
              <div className="panel-title">Поделиться профилем</div>
              
              <div className="share-section">
                <div className="share-title">📤 Экспорт профиля</div>
                <div className="share-desc">
                  Сохраните ваш профиль в JSON-файл и отправьте другу. Он сможет открыть его на этом же сайте.
                </div>
                <button 
                  className="btn btn-primary" 
                  style={{display:'flex',alignItems:'center',gap:'8px'}}
                  onClick={() => {
                    const exportData = {
                      version: '1.0',
                      exportedAt: new Date().toISOString(),
                      profile: {
                        username: user?.username,
                        displayName,
                        bio,
                        links,
                        theme,
                        effects,
                        profilePhoto,
                        bgPhoto,
                        location
                      }
                    };
                    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `linkhub-${user?.username}-profile.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                  }}
                >
                  <span>💾</span> Скачать профиль (.json)
                </button>
              </div>

              <div className="share-section" style={{background:'rgba(29,233,182,.05)',borderColor:'rgba(29,233,182,.2)'}}>
                <div className="share-title" style={{color:'var(--accent3)'}}>📥 Импорт профиля</div>
                <div className="share-desc">
                  Получили файл профиля от друга? Загрузите его здесь, чтобы просмотреть страницу.
                </div>
                <div style={{
                  border:'2px dashed var(--border)',borderRadius:'12px',padding:'20px',
                  textAlign:'center',cursor:'pointer',position:'relative',background:'rgba(255,255,255,.02)'
                }}>
                  <input 
                    type="file" 
                    accept=".json,application/json" 
                    style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}
                    onChange={(e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (ev) => {
                        try {
                          const data = JSON.parse(ev.target.result);
                          if (data.profile) {
                            localStorage.setItem('linkhub_imported_profile', JSON.stringify(data.profile));
                            navigate(`/p/imported-${Date.now()}`);
                          } else {
                            alert('Неверный формат файла профиля');
                          }
                        } catch (err) {
                          alert('Ошибка чтения файла');
                        }
                      };
                      reader.readAsText(file);
                    }}
                  />
                  <div style={{fontSize:'2rem',marginBottom:'8px'}}>📁</div>
                  <div style={{fontSize:'.9rem',color:'var(--muted)'}}>Нажмите или перетащите файл профиля</div>
                </div>
              </div>

              <div className="share-section">
                <div className="share-title">🔗 Прямая ссылка (локально)</div>
                <div className="share-desc">
                  Эта ссылка работает только в вашем браузере, так как данные хранятся локально:
                </div>
                <div className="share-url">
                  {window.location.origin + window.location.pathname}#/p/{user?.username}
                </div>
                <button 
                  className="btn btn-ghost btn-sm" 
                  onClick={() => {
                    navigator.clipboard.writeText(window.location.origin + window.location.pathname + '#/p/' + user?.username);
                    alert('Ссылка скопирована!');
                  }}
                >
                  📋 Копировать ссылку
                </button>
              </div>
            </>}

          </div>
        </div>
      </div>
    </div>
  </div>;
}

// ── Music Player Component ─────────────────────────────────────────────────────
function MusicPlayer({music, accentColor}) {
  const audioRef = useRef(null);
  const [playing, setPlaying] = useState(false);

  useEffect(() => {
    if (audioRef.current) {
      audioRef.current.volume = 0.5;
    }
  }, []);

  const toggle = () => {
    if (!audioRef.current) return;
    if (playing) { audioRef.current.pause(); setPlaying(false); }
    else { audioRef.current.play().then(() => setPlaying(true)).catch(() => {}); }
  };

  return <div className="music-player">
    <audio ref={audioRef} src={music.data} loop onEnded={() => setPlaying(false)}/>
    <div className="music-cover" style={{background:`linear-gradient(135deg,${accentColor},#22d3ee)`}}>
      🎵
    </div>
    <div className="music-info">
      <div className="music-title">{music.name}</div>
      <div className="music-sub">{playing ? '▶ Воспроизводится...' : '⏸ Нажмите для воспроизведения'}</div>
    </div>
    <button className="music-btn" onClick={toggle}>
      {playing ? '⏸' : '▶'}
    </button>
  </div>;
}

// ── Public Page ───────────────────────────────────────────────────────────────
function PublicPage({username}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [notFound, setNotFound] = useState(false);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const loadProfile = async () => {
      if (username?.startsWith('imported-')) {
        const imported = localStorage.getItem('linkhub_imported_profile');
        if (imported) {
          try {
            const profile = JSON.parse(imported);
            setData(profile);
            setLoading(false);
            return;
          } catch {}
        }
      }

      // Загрузка из Firebase
      const waitForFirebase = async (attempts = 0) => {
        if (window.__firebase) {
          try {
            const { db, doc, getDoc } = window.__firebase;
            // Ищем uid по username
            const unameSnap = await getDoc(doc(db, 'usernames', username));
            if (!unameSnap.exists()) { setNotFound(true); setLoading(false); return; }
            const uid = unameSnap.data().uid;
            const userSnap = await getDoc(doc(db, 'users', uid));
            if (userSnap.exists()) {
              setData({ id: uid, ...userSnap.data() });
            } else {
              setNotFound(true);
            }
          } catch(e) {
            console.error('PublicPage load error:', e);
            setNotFound(true);
          }
          setLoading(false);
        } else if (attempts < 20) {
          setTimeout(() => waitForFirebase(attempts + 1), 200);
        } else {
          setNotFound(true);
          setLoading(false);
        }
      };
      waitForFirebase();
    };
    loadProfile();
  }, [username]);

  const copy = async () => {
    try { await navigator.clipboard.writeText(window.location.href); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
  };

  const getBg = () => {
    if (!data) return '#0a0a0a';
    if (data.bgPhoto) return null;
    switch(data.theme?.background) {
      case 'gradient': return `linear-gradient(135deg, ${data.theme.accentColor}40, #22d3ee25)`;
      case 'purple': return '#1a0a2e';
      case 'blue': return '#0a1628';
      case 'green': return 'linear-gradient(135deg,#0a1a0f,#0d2a18)';
      case 'sunset': return 'linear-gradient(135deg,#3d1a00,#1a0a2e)';
      default: return '#0a0a0a';
    }
  };

  if (loading) return <div className="full-center"><div className="spinner"/></div>;
  
  if (notFound) return <div className="not-found">
    <div style={{fontFamily:'var(--font-head)',fontSize:'5rem',fontWeight:800,background:'var(--gradient)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>404</div>
    <div style={{color:'var(--muted)',fontSize:'1.1rem'}}>Пользователь не найден</div>
    <div style={{color:'var(--muted)',fontSize:'.85rem',maxWidth:360,textAlign:'center',lineHeight:1.6,marginBottom:24}}>
      Этот профиль не существует в вашем браузере. Попросите друга экспортировать профиль в файл и импортируйте его на главной странице.
    </div>
    <div style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}}>
      <button className="btn btn-primary" onClick={() => navigate('/')}>На главную</button>
      <button className="btn btn-success" onClick={() => navigate('/dashboard')}>Импортировать профиль</button>
    </div>
  </div>;

  const initials = (data.displayName || data.username || '?').slice(0,2).toUpperCase();
  const accent = data.theme?.accentColor || '#4f9eff';
  const effects = data.effects || {};
  const theme = data.theme || {};
  const glowColor = accent + '66';
  const isImported = username?.startsWith('imported-');
  const cardBg = theme.cardBackground || '#141414';
  const opacity = (theme.cardOpacity || 80) / 100;

  return <div className="public-page" style={{background: data.bgPhoto ? 'transparent' : getBg(), fontFamily: theme.font || 'DM Sans'}}>

    {effects.animatedBackground && !data.bgPhoto && <div className="animated-bg"/>}

    {data.bgPhoto && <>
      <div className="public-bg" style={{backgroundImage:`url(${data.bgPhoto})`}}/>
      <div className="public-bg-overlay" style={{backdropFilter:'blur(2px)'}}/>
    </>}

    {effects.particles && effects.particleType !== 'none' && <ParticlesCanvas type={effects.particleType} color={accent}/>}

    {!data.bgPhoto && <>
      <div className="orb orb1" style={{background:`${accent}12`}}/>
      <div className="orb orb2" style={{background:`${accent}08`}}/>
    </>}

    <div className="public-card" style={{
      background: `${cardBg}${Math.round(opacity * 255).toString(16).padStart(2, '0')}`,
      backdropFilter: `blur(${theme.cardBlur || 0}px)`,
      borderRadius: '24px',
      padding: '40px',
      border: `1px solid ${accent}30`
    }}>
      <div className="public-avatar" style={{
        background: data.profilePhoto ? 'transparent' : `linear-gradient(135deg, ${accent}, ${theme.secondaryColor || '#22d3ee'})`,
        filter: `blur(${theme.profileBlur || 0}px)`
      }}>
        {data.profilePhoto ? <img src={data.profilePhoto} alt="avatar"/> : initials}
      </div>

      <div className="public-name" style={{color: theme.textColor || '#fafafa'}}>
        {data.displayName || data.username}
        {isImported && <span style={{fontSize:'.7rem',display:'block',color:'var(--accent3)',marginTop:4}}>📥 Импортированный профиль</span>}
      </div>
      
      {data.bio && <div className="public-bio" style={{color: theme.textColor || '#fafafa'}}>{data.bio}</div>}

      {data.music && <MusicPlayer music={data.music} accentColor={accent}/>}

      {(data.links || []).map(l => <a key={l.id}
        className={`public-link${effects.glow ? ' glow-effect' : ''}`}
        href={l.url}
        target="_blank"
        rel="noreferrer"
        style={{
          '--link-glow': glowColor,
          borderColor: effects.glow ? `${accent}40` : `${accent}20`,
          background: effects.glow ? `${accent}18` : `${cardBg}80`,
          color: theme.textColor || '#fff'
        }}>
        <span className="public-link-icon" style={{filter: effects.monochromeIcons ? 'grayscale(100%)' : 'none'}}>{getLinkIcon(l.title, l.url)}</span>
        <span className="public-link-text">{l.title}</span>
      </a>)}

      <div className="public-footer">
        <button className="btn btn-ghost btn-sm" style={{marginRight:8,color:'rgba(255,255,255,.6)',borderColor:'rgba(255,255,255,.15)'}} onClick={copy}>
          {copied ? '✓ Скопировано' : '🔗 Поделиться'}
        </button>
        <br/><br/>
        {isImported ? 
          <span onClick={() => navigate('/')}>← Назад на главную</span> :
          <span onClick={() => navigate('/')}>Сделано на LinkHub</span>
        }
      </div>
    </div>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function AppShell() {
  const {page, params} = useRoute();
  const {isAuthenticated} = useAuth();
  const showNav = page !== 'public';

  if (page === 'public') return <PublicPage username={params.username}/>;

  return <>
    {showNav && <Nav/>}
    {page === 'home' && <Home/>}
    {page === 'login' && <Login/>}
    {page === 'register' && <Register/>}
    {page === 'dashboard' && <Dashboard/>}
  </>;
}

function App() {
  return <AuthProvider>
    <RouterProvider>
      <FirebaseSetupBanner/>
      <AppShell/>
    </RouterProvider>
  </AuthProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
